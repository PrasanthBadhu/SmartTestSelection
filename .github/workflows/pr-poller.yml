################################################################################
# pr-poller.yml
# Location: tr/CobaltRegressionTesting/.github/workflows/pr-poller.yml
#
# Purpose:
#   Manually triggered workflow to discover PRs from tr/cobalt_search by either:
#     a) explicit PR number(s), or
#     b) date range + state filter
#   then analyze their file impact, map to test categories, and dispatch the
#   appropriate WL_DNet_*.yml regression workflows.
#
#   Fully self-contained: uses bundled copies of feature-map-search.yml and tool scripts
#   — no runtime dependency on tr/Seven-Kingdoms or tr/CobaltRegressionTesting.
#
# Inputs:
#   pr_numbers  -- PR number(s), comma-separated (e.g. 2460,2461). Optional.
#                  If given, date range inputs are ignored.
#   date_from   -- PRs created on/after this date (YYYY-MM-DD). Optional.
#   date_to     -- PRs created on/before this date (YYYY-MM-DD). Blank = now.
#   state       -- State filter: merged | all | open | closed. Default: merged.
#                  'merged' means closed PRs that were actually merged.
#   env         -- Test environment: Demo | QED | QEDAWS. Default: Demo.
#
# Secrets required:
#   COBALT_READ_TOKEN      -- GitHub PAT with read:repo on tr/cobalt_search
#   REGRESSION_TRIGGER_PAT -- GitHub PAT with workflow:write on this repo
################################################################################

name: PR Poller (Manual)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (analyse but do not trigger regression)"
        required: false
        type: boolean
        default: false
      pr_numbers:
        description: "PR numbers (e.g. 2460,2461). "
        required: false
        type: string
        default: ""
      scan_date:
        description: "Single date to scan merged PRs (YYYY-MM-DD). Overrides date_from/date_to."
        required: false
        type: string
        default: ""
      date_from:
        description: "Date range start — PRs created on/after (YYYY-MM-DD). Ignored if PR number(s) given."
        required: false
        type: string
        default: ""
      date_to:
        description: "Date range end — PRs created on/before (YYYY-MM-DD). Blank = up to now."
        required: false
        type: string
        default: ""
      state:
        description: "State filter for date range. 'merged' = closed PRs that were actually merged."
        required: false
        type: choice
        default: "merged"
        options:
          - merged
          - all
          - open
          - closed
      env:
        description: "Test environment to run against."
        required: false
        type: choice
        default: "DEMO"
        options:
          - DEMO
          - QED
          - QEDAWS
      test_site:
        description: "Test site for Java workflows (TEST_SITE). Only used by WL_Java_* workflows."
        required: false
        type: choice
        default: "main"
        options:
          - main
          - use1
          - use2
      max_prs:
        description: "Max PRs to process per repo (prevents timeout on broad date ranges). Default: 100."
        required: false
        type: string
        default: "100"

permissions:
  contents: read
  actions:  write
  issues:   write

jobs:
  run-selective-regression:
    name: Discover PRs and dispatch selective regression
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Step 0: Checkout (provides bundled tools + feature-map) ─────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REGRESSION_TRIGGER_PAT }}
          fetch-depth: 1

      # ── Step 1: Set up Python ────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r tools/requirements.txt

      # ── Step 2: Discover PRs (by number or date range) ──────────────────────
      - name: Discover PRs
        id: discover
        env:
          GITHUB_TOKEN: ${{ secrets.COBALT_READ_TOKEN }}
          PR_NUMBERS:   ${{ inputs.pr_numbers }}
          SCAN_DATE:    ${{ inputs.scan_date }}
          DATE_FROM:    ${{ inputs.date_from }}
          DATE_TO:      ${{ inputs.date_to }}
          STATE:        ${{ inputs.state }}
          MAX_PRS:      ${{ inputs.max_prs }}
        run: |
          python3 - <<'EOF'
          import os, json, sys, yaml, subprocess
          from datetime import datetime, timezone, timedelta
          from pathlib import Path
          from github import Github, GithubException

          token = os.environ.get("GITHUB_TOKEN")
          if not token:
              print("ERROR: COBALT_READ_TOKEN not set", file=sys.stderr)
              sys.exit(1)

          registry      = yaml.safe_load(Path("config/repo-registry.yml").read_text())
          enabled_repos = [r for r in registry.get("repos", []) if r.get("enabled")]

          pr_numbers_raw  = os.environ.get("PR_NUMBERS", "").strip()
          scan_date_raw   = os.environ.get("SCAN_DATE",  "").strip()
          date_from_raw   = os.environ.get("DATE_FROM",  "").strip()
          date_to_raw     = os.environ.get("DATE_TO",    "").strip()
          state_filter    = os.environ.get("STATE", "merged").strip().lower()

          date_from       = None
          date_to         = None
          using_scan_date = False
          if not pr_numbers_raw:
              if scan_date_raw:
                  # Exact UTC day — midnight to 23:59:59, no IST 1-day extension
                  date_from       = datetime.strptime(scan_date_raw, "%Y-%m-%d").replace(
                                        hour=0, minute=0, second=0, tzinfo=timezone.utc)
                  date_to         = datetime.strptime(scan_date_raw, "%Y-%m-%d").replace(
                                        hour=23, minute=59, second=59, tzinfo=timezone.utc)
                  date_from_raw   = scan_date_raw
                  date_to_raw     = scan_date_raw
                  using_scan_date = True
                  print(f"  scan_date={scan_date_raw}: {date_from.isoformat()} → {date_to.isoformat()}",
                        file=sys.stderr)
              else:
                  if date_from_raw:
                      date_from = datetime.strptime(date_from_raw, "%Y-%m-%d").replace(tzinfo=timezone.utc)
                  if date_to_raw:
                      date_to = datetime.strptime(date_to_raw, "%Y-%m-%d").replace(
                          hour=23, minute=59, second=59, tzinfo=timezone.utc)

          g        = Github(token)
          pr_list  = []
          seen_ids = set()

          def add_pr(pr, repo_entry):
              key = (repo_entry["full_name"], pr.number)
              if key in seen_ids:
                  return
              seen_ids.add(key)
              pr_list.append({
                  "repo_name":         repo_entry["name"],
                  "repo_full_name":    repo_entry["full_name"],
                  "feature_map_local": repo_entry.get("feature_map_local", ""),
                  "number":            pr.number,
                  "title":             pr.title,
                  "html_url":          pr.html_url,
                  "head_sha":          pr.head.sha,
                  "state":             pr.state,
                  "merged_at":         pr.merged_at.isoformat() if pr.merged_at  else None,
                  "created_at":        pr.created_at.isoformat() if pr.created_at else None,
              })

          for repo_entry in enabled_repos:
              repo_full = repo_entry["full_name"]
              print(f"\nScanning {repo_full} ...", file=sys.stderr)
              try:
                  gh_repo = g.get_repo(repo_full)
              except GithubException as e:
                  print(f"  WARNING: cannot access {repo_full}: {e}", file=sys.stderr)
                  continue

              if pr_numbers_raw:
                  print(f"  Mode: explicit PR numbers ({pr_numbers_raw})", file=sys.stderr)
                  for num_str in pr_numbers_raw.split(","):
                      num_str = num_str.strip()
                      if not num_str.isdigit():
                          continue
                      try:
                          pr = gh_repo.get_pull(int(num_str))
                          add_pr(pr, repo_entry)
                          print(f"  Found PR #{pr.number}: {pr.title[:60]}", file=sys.stderr)
                      except GithubException as e:
                          print(f"  PR #{num_str} not in {repo_full}: {e}", file=sys.stderr)
              else:
                  if state_filter == "merged" and date_from_raw:
                      range_end = date_to_raw if date_to_raw else date_from_raw

                      if using_scan_date:
                          # scan_date gives exact UTC datetimes — use as-is,
                          # no timezone offset extension needed.
                          scan_from     = date_from
                          scan_from_raw = date_from.strftime("%Y-%m-%d")
                      else:
                          # Calendar date range: extend 1 day earlier so "June 10 IST"
                          # PRs (merged_at on June 9 UTC) are not excluded.
                          _scan_from_dt = (datetime.strptime(date_from_raw, "%Y-%m-%d")
                                           - timedelta(days=1))
                          scan_from_raw = _scan_from_dt.strftime("%Y-%m-%d")
                          scan_from     = _scan_from_dt.replace(tzinfo=timezone.utc)
                      print(f"  Scan window: {scan_from_raw} -> {range_end} "
                            f"(scan_date={using_scan_date})",
                            file=sys.stderr)

                      def _add_pr_data(pr_data, mdt):
                          key = (repo_full, pr_data["number"])
                          if key in seen_ids:
                              return False
                          seen_ids.add(key)
                          pr_list.append({
                              "repo_name":         repo_entry["name"],
                              "repo_full_name":    repo_full,
                              "feature_map_local": repo_entry.get("feature_map_local", ""),
                              "number":            pr_data["number"],
                              "title":             pr_data["title"],
                              "html_url":          pr_data["url"],
                              "head_sha":          pr_data.get("headRefOid", ""),
                              "state":             "closed",
                              "merged_at":         mdt.isoformat(),
                              "created_at":        pr_data.get("createdAt", ""),
                          })
                          return True

                      # PRIMARY: gh pr list --search uses GitHub Search API with
                      # the merged: qualifier which queries merged_at directly —
                      # finds PRs merged in the window regardless of created_at.
                      #
                      # Use ISO datetimes for scan_date (avoids date-boundary
                      # ambiguity: "merged:2026-06-16" = midnight UTC only, so PRs
                      # merged later on June 16 would be missed with date-only strings).
                      if using_scan_date:
                          _sq_from = date_from.strftime("%Y-%m-%dT%H:%M:%SZ")
                          _sq_to   = date_to.strftime("%Y-%m-%dT%H:%M:%SZ")
                          merged_q = f"merged:{_sq_from}..{_sq_to}"
                      else:
                          merged_q = f"merged:{scan_from_raw}..{range_end}"

                      search_count = 0
                      s_cmd = [
                          "gh", "pr", "list", "--repo", repo_full,
                          "--search", f"is:merged {merged_q}",
                          "--limit", "500",
                          "--json", "number,title,mergedAt,createdAt,url,headRefOid"
                      ]
                      print(f"  [search] {merged_q}", file=sys.stderr)
                      sr = subprocess.run(s_cmd, capture_output=True, text=True)
                      if sr.returncode == 0 and sr.stdout.strip():
                          for pd in json.loads(sr.stdout):
                              mat = pd.get("mergedAt", "")
                              if not mat:
                                  continue
                              mdt = datetime.fromisoformat(mat.replace("Z", "+00:00"))
                              if mdt < scan_from:
                                  continue
                              if date_to and mdt > date_to:
                                  continue
                              if _add_pr_data(pd, mdt):
                                  search_count += 1
                                  print(f"  [search] #{pd['number']} merged=[{mdt.date()}]: {pd['title'][:50]}",
                                        file=sys.stderr)
                      else:
                          print(f"  [search] failed/empty — {sr.stderr[:200]}", file=sys.stderr)
                      print(f"  [source] search added {search_count}", file=sys.stderr)

                      # SUPPLEMENT: Pulls API (no Search scope needed).
                      # Fetch 1000 most-recently-created merged PRs and filter
                      # by merged_at in Python — catches any the Search API missed.
                      supp_count = 0
                      c_cmd = [
                          "gh", "pr", "list", "--repo", repo_full,
                          "--state", "merged",
                          "--limit", "1000",
                          "--json", "number,title,mergedAt,createdAt,url,headRefOid"
                      ]
                      print(f"  [supp]   fetching up to 1000 merged PRs via Pulls API...",
                            file=sys.stderr)
                      cr = subprocess.run(c_cmd, capture_output=True, text=True)
                      if cr.returncode == 0 and cr.stdout.strip():
                          for pd in json.loads(cr.stdout):
                              mat = pd.get("mergedAt", "")
                              if not mat:
                                  continue
                              mdt = datetime.fromisoformat(mat.replace("Z", "+00:00"))
                              if mdt < scan_from:
                                  continue
                              if date_to and mdt > date_to:
                                  continue
                              if _add_pr_data(pd, mdt):
                                  supp_count += 1
                                  print(f"  [supp]   #{pd['number']} merged=[{mdt.date()}]: {pd['title'][:50]}",
                                        file=sys.stderr)
                      else:
                          print(f"  [supp]   failed — {cr.stderr[:200]}", file=sys.stderr)
                      print(f"  [source] supplement added {supp_count}", file=sys.stderr)

                      _repo_total = search_count + supp_count
                      print(f"  [total]  {repo_full}: {_repo_total} PR(s) "
                            f"(search+{search_count} / supp+{supp_count})", file=sys.stderr)
                      print(f"::notice::{repo_full}: {_repo_total} merged PR(s) "
                            f"(search+{search_count} / supp+{supp_count})")
                  else:
                      # Non-merged states: paginate with 90-day lookback on created_at.
                      api_state = (state_filter if state_filter != "all" else "all")
                      pr_lookback = timedelta(days=90)
                      for pr in gh_repo.get_pulls(state=api_state, sort="created",
                                                  direction="desc"):
                          created = pr.created_at
                          if date_from and created < (date_from - pr_lookback):
                              break
                          if date_to and created > date_to:
                              continue
                          if date_from and created < date_from:
                              continue
                          add_pr(pr, repo_entry)
                          print(f"  PR #{pr.number} [{created.date()}]: {pr.title[:55]}",
                                file=sys.stderr)

          # Apply per-repo cap to prevent timeouts on broad date-range scans.
          max_prs_str = os.environ.get("MAX_PRS", "100").strip()
          max_prs = int(max_prs_str) if max_prs_str.isdigit() and int(max_prs_str) > 0 else 100
          if not pr_numbers_raw:
              from collections import defaultdict
              _by_repo = defaultdict(list)
              for p in pr_list:
                  _by_repo[p["repo_name"]].append(p)
              pr_list = []
              for rname, rlist in _by_repo.items():
                  if len(rlist) > max_prs:
                      print(f"  WARNING: {rname} has {len(rlist)} PRs — capping at {max_prs}. "
                            f"Use a narrower date range or increase max_prs.", file=sys.stderr)
                      print(f"::warning::{rname}: {len(rlist)} PRs found, capped at {max_prs}. "
                            f"Narrow your date range or increase max_prs.")
                  pr_list.extend(rlist[:max_prs])

          print(f"\nTotal PRs to analyze: {len(pr_list)} "
                f"across {len(enabled_repos)} repo(s)", file=sys.stderr)

          Path("state").mkdir(parents=True, exist_ok=True)
          Path("state/prs_discovered.json").write_text(json.dumps(pr_list, indent=2))

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"pr_count={len(pr_list)}\n")
          EOF

      # ── Step 3: Analyze PR file impact (concurrent, no per-PR subprocess) ────
      - name: Analyze PR impact
        if: steps.discover.outputs.pr_count != '0'
        id: analyze
        env:
          GH_TOKEN: ${{ secrets.COBALT_READ_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json, os, re, sys, subprocess, yaml
          from datetime import datetime, timezone
          from pathlib import Path
          from concurrent.futures import ThreadPoolExecutor, as_completed

          prs = json.loads(Path("state/prs_discovered.json").read_text())

          # --- Feature-map helpers ---
          _fm_cache = {}
          def _load_fm(fm_local):
              key = fm_local or "config/feature-map-search.yml"
              if key not in _fm_cache:
                  p = Path(key)
                  if not p.exists():
                      p = Path("config/feature-map-search.yml")
                  _fm_cache[key] = yaml.safe_load(p.read_text()) if p.exists() else {}
              return _fm_cache[key]

          _DEFAULT_MODULES = {
              "SearchCommon": "SearchCommon/", "SearchMetadataObjects": "SearchMetadataObjects/",
              "SearchSerialized": "SearchSerialized/", "CarswellEcosystem": "CarswellEcosystem/",
              "CobaltPlatformSearch": "CobaltPlatformSearch/", "CarswellSearchWeb": "CarswellSearchWeb/",
              "TNPCarswellSearchWeb": "TNPCarswellSearchWeb/", "WFASearchWeb": "WFASearchWeb/",
              "WLNSearch": "WLNSearch/", "CorrectionalSearch": "CorrectionalSearch/",
              "DraftingSearch": "DraftingSearch/", "WeblinksSearch": "WeblinksSearch/",
          }

          def _module_prefixes(fm):
              mods = fm.get("modules") or {}
              return {m: m + "/" for m in mods.keys()} if mods else _DEFAULT_MODULES

          def _sub_path_products(fm):
              return {
                  pfx: e.get("product", pfx.split("/")[-2] if "/" in pfx else pfx)
                  for pfx, e in (fm.get("sub_paths") or {}).items()
              }

          CHANGE_TYPE_MAP = [
              (r"^feat", "feature"), (r"^fix", "bug_fix"), (r"^bug", "bug_fix"),
              (r"^refactor", "refactor"), (r"^test", "test"), (r"^docs?", "docs"),
              (r"^chore", "chore"), (r"^ci", "chore"), (r"^build", "chore"),
              (r"^breaking", "breaking_change"),
          ]
          HIGH_RISK_PATTERNS  = [r"breaking", r"migration", r"schema", r"serializ",
                                   r"api.?change", r"remove", r"deprecat", r"security",
                                   r"auth", r"critical"]
          MEDIUM_RISK_PATTERNS = [r"fix", r"search", r"query", r"index", r"filter",
                                   r"limit", r"performance", r"timeout", r"exception"]
          HIGH_RISK_MODULES = {"SearchCommon", "SearchSerialized", "CobaltPlatformSearch"}

          def detect_modules(fps, mods):
              return sorted({m for fp in fps for m, pfx in mods.items() if fp.startswith(pfx)}) or ["unknown"]

          def detect_sub_products(fps, subs):
              return sorted({prod for fp in fps for pfx, prod in subs.items() if fp.startswith(pfx)})

          def detect_keyword_products(title):
              t = title.lower()
              kw = {"brazil": "brazil", "wluk": "wluk", "uk companies": "wluk",
                    "aunz": "aunz", "anz": "aunz", "phone plus": "publicrecords",
                    "cad alert": "carswell", "cover page": "carswell", "citing": "carswell",
                    "presearch": "platform", "advanced query": "platform", "facet": "wln"}
              return sorted({prod for k, prod in kw.items() if k in t})

          def detect_change_type(title):
              for pat, ct in CHANGE_TYPE_MAP:
                  if re.search(pat, title, re.IGNORECASE): return ct
              return "chore"

          def detect_risk(title, modules):
              c = title.lower()
              for p in HIGH_RISK_PATTERNS:
                  if re.search(p, c): return "high"
              if any(m in HIGH_RISK_MODULES for m in modules): return "medium"
              for p in MEDIUM_RISK_PATTERNS:
                  if re.search(p, c): return "medium"
              return "low"

          def fetch_and_analyze(pr_info):
              pr_num    = pr_info["number"]
              repo_full = pr_info.get("repo_full_name", "tr/cobalt_search")
              repo_name = pr_info.get("repo_name",      "cobalt_search")
              fm_local  = pr_info.get("feature_map_local", "")
              title     = pr_info.get("title", "")

              # Fetch changed files via gh CLI (uses GH_TOKEN, no PyGitHub needed)
              r = subprocess.run(
                  ["gh", "pr", "view", str(pr_num), "--repo", repo_full, "--json", "files"],
                  capture_output=True, text=True
              )
              file_paths = []
              if r.returncode == 0 and r.stdout.strip():
                  file_paths = [f["path"] for f in json.loads(r.stdout).get("files", [])]

              fm   = _load_fm(fm_local)
              mods = _module_prefixes(fm)
              subs = _sub_path_products(fm)

              modules      = detect_modules(file_paths, mods)
              sub_products = detect_sub_products(file_paths, subs)
              kw_products  = detect_keyword_products(title)
              all_products = sorted(set(sub_products + kw_products) or {"platform"})

              impact = {
                  "pr_number":        pr_num,
                  "pr_title":         title,
                  "pr_author":        "",
                  "pr_url":           pr_info.get("html_url", ""),
                  "head_sha":         pr_info.get("head_sha", ""),
                  "base_branch":      "",
                  "state":            pr_info.get("state", "closed"),
                  "created_at":       pr_info.get("created_at", ""),
                  "updated_at":       None,
                  "merged_at":        pr_info.get("merged_at", ""),
                  "labels":           [],
                  "changed_files":    len(file_paths),
                  "additions":        0,
                  "deletions":        0,
                  "file_paths":       file_paths,
                  "modules_affected": modules,
                  "sub_products":     sub_products,
                  "keyword_products": kw_products,
                  "all_products":     all_products,
                  "change_type":      detect_change_type(title),
                  "risk_level":       detect_risk(title, modules),
                  "analyzed_at":      datetime.now(timezone.utc).isoformat(),
              }

              out_dir = Path(f"state/{repo_name}/pr_impacts")
              out_dir.mkdir(parents=True, exist_ok=True)
              (out_dir / f"pr_{pr_num}.json").write_text(json.dumps(impact, indent=2))
              return pr_num, repo_name, len(file_paths)

          MAX_WORKERS = 10
          print(f"Analyzing {len(prs)} PR(s) with {MAX_WORKERS} parallel workers...",
                file=sys.stderr)
          with ThreadPoolExecutor(max_workers=MAX_WORKERS) as executor:
              futures = {executor.submit(fetch_and_analyze, pr): pr for pr in prs}
              for future in as_completed(futures):
                  try:
                      pr_num, repo_name, nfiles = future.result()
                      print(f"  Analyzed {repo_name} PR #{pr_num}: {nfiles} file(s)")
                  except Exception as exc:
                      print(f"  WARNING: analysis error: {exc}", file=sys.stderr)
          print("Analysis complete.")
          EOF

      # ── Step 4: Map impact to WL_DNet workflows (per-repo feature-map) ───────
      - name: Map impact to test workflows
        if: steps.discover.outputs.pr_count != '0'
        id: map
        run: |
          python3 - <<'EOF'
          import json, os, subprocess, sys
          from pathlib import Path

          prs       = json.loads(Path("state/prs_discovered.json").read_text())
          plans_dir = Path("state/test_plans")
          plans_dir.mkdir(parents=True, exist_ok=True)
          all_dotnet_wf = set()
          all_java_wf   = set()
          plan_count    = 0

          for pr_info in prs:
              pr_num    = pr_info["number"]
              repo_name = pr_info.get("repo_name", "cobalt_search")
              fm_local  = pr_info.get("feature_map_local", "config/feature-map-search.yml")
              pr_key    = f"{repo_name}_{pr_num}"

              fm_path     = fm_local if fm_local and Path(fm_local).exists() \
                            else "config/feature-map-search.yml"
              impact_file = Path(f"state/{repo_name}/pr_impacts/pr_{pr_num}.json")
              plan_file   = plans_dir / f"{pr_key}.json"

              if not impact_file.exists():
                  print(f"  SKIP {repo_name} PR #{pr_num}: no impact file", file=sys.stderr)
                  continue

              cmd = [
                  sys.executable, "tools/feature_test_mapper.py",
                  "--impact",    str(impact_file),
                  "--output",    str(plan_file),
                  "--map-local", fm_path,
              ]
              result = subprocess.run(cmd, capture_output=True, text=True)
              if result.returncode != 0:
                  print(f"  FAIL {repo_name} PR #{pr_num}: {result.stderr.strip()}", file=sys.stderr)
                  continue

              plan = json.loads(plan_file.read_text())
              if not plan.get("skip_all"):
                  all_dotnet_wf.update(plan.get("dotnet_workflows", []))
                  all_java_wf.update(plan.get("java_workflows", []))
              plan_count += 1
              print(f"  {repo_name} PR #{pr_num}: "
                    f"{len(plan.get('dotnet_workflows',[]))} DNet + "
                    f"{len(plan.get('java_workflows',[]))} Java workflow(s) "
                    f"[{plan.get('risk_level','?').upper()}]")

          Path("state/all_impacted_workflows.json").write_text(
              json.dumps(sorted(all_dotnet_wf), indent=2))
          Path("state/all_impacted_java_workflows.json").write_text(
              json.dumps(sorted(all_java_wf), indent=2))

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"plan_count={plan_count}\n")
              f.write(f"workflow_count={len(all_dotnet_wf)}\n")
              f.write(f"java_workflow_count={len(all_java_wf)}\n")

          print(f"\nPlans built: {plan_count}  DNet: {len(all_dotnet_wf)}  Java: {len(all_java_wf)}")
          for wf in sorted(all_dotnet_wf):
              print(f"  [DNet] {wf}.yml")
          for wf in sorted(all_java_wf):
              print(f"  [Java] {wf}.yml")
          EOF

      # ── Step 5: Build per-file impact details (per-repo feature-map) ─────────
      - name: Build per-file impact details
        if: steps.discover.outputs.pr_count != '0'
        run: |
          python3 - <<'EOF'
          import json, yaml, sys
          from pathlib import Path

          _fm_cache = {}

          def load_fm(path):
              if path not in _fm_cache:
                  p = Path(path)
                  if not p.exists():
                      p = Path("config/feature-map-search.yml")
                  _fm_cache[path] = yaml.safe_load(p.read_text())
              return _fm_cache[path]

          def classify_file(filepath, fm):
              fm_modules   = (fm.get("modules") or {})
              fm_sub_paths = (fm.get("sub_paths") or {})
              best_prefix  = None
              best_entry   = None
              for prefix, entry in fm_sub_paths.items():
                  if filepath.startswith(prefix):
                      if best_prefix is None or len(prefix) > len(best_prefix):
                          best_prefix = prefix
                          best_entry  = entry
              if best_entry:
                  return {"matched_by": "sub_path", "match_key": best_prefix,
                          "categories": best_entry.get("test_categories", []), "risk": "medium"}
              for mod_name, mod_entry in fm_modules.items():
                  if filepath.startswith(mod_name + "/"):
                      return {"matched_by": "module", "match_key": mod_name,
                              "categories": mod_entry.get("test_categories", []),
                              "risk": mod_entry.get("risk_multiplier", "low")}
              fp_lower = filepath.lower()
              if ("/test/" in fp_lower or "/tests/" in fp_lower or
                      fp_lower.endswith("test.java") or fp_lower.endswith("tests.java") or
                      fp_lower.endswith("test.groovy") or fp_lower.endswith("test.cs")):
                  return {"matched_by": "test_file", "match_key": None,
                          "categories": [], "risk": "low"}
              return {"matched_by": "none", "match_key": None, "categories": [], "risk": "low"}

          prs    = json.loads(Path("state/prs_discovered.json").read_text())
          report = {}

          for pr_info in prs:
              pr_num    = pr_info["number"]
              repo_name = pr_info.get("repo_name", "cobalt_search")
              fm_local  = pr_info.get("feature_map_local", "config/feature-map-search.yml")
              pr_key    = f"{repo_name}_{pr_num}"

              impact_file = Path(f"state/{repo_name}/pr_impacts/pr_{pr_num}.json")
              if not impact_file.exists():
                  continue

              fm         = load_fm(fm_local or "config/feature-map-search.yml")
              impact     = json.loads(impact_file.read_text())
              file_paths = impact.get("file_paths", [])
              files      = [{"filename": fp, **classify_file(fp, fm)} for fp in file_paths]

              report[pr_key] = {
                  "repo_name": repo_name,
                  "pr_number": pr_num,
                  "pr_title":  pr_info.get("title", ""),
                  "pr_title":  pr_info.get("title", ""),
                  "pr_url":    pr_info.get("html_url", ""),
                  "files":     files,
              }
              matched = sum(1 for f in files if f["matched_by"] != "none")
              print(f"  {repo_name} PR #{pr_num}: {len(files)} file(s), {matched} mapped")

          Path("state/per_file_impacts.json").write_text(json.dumps(report, indent=2))
          print(f"Wrote state/per_file_impacts.json ({len(report)} PR(s))")
          EOF

      # ── Step 6: Dispatch WL_DNet_*.yml and WL_Java_*.yml workflows ──────────
      - name: Dispatch regression workflows
        if: steps.discover.outputs.pr_count != '0'
        env:
          GH_TOKEN:  ${{ secrets.REGRESSION_TRIGGER_PAT }}
          REPO:      tr/CobaltRegressionTesting
          TEST_ENV:  ${{ inputs.env }}
          TEST_SITE: ${{ inputs.test_site }}
          DRY_RUN:   ${{ inputs.dry_run }}
        run: |
          python3 - <<'EOF'
          import json, os, subprocess, sys
          from pathlib import Path

          repo      = os.environ["REPO"]
          test_env  = os.environ.get("TEST_ENV",  "DEMO")
          test_site = os.environ.get("TEST_SITE", "main")
          dry_run   = os.environ.get("DRY_RUN", "false").lower() == "true"
          gh        = "gh"

          if dry_run:
              print("DRY RUN — analysis complete, regression workflows will NOT be triggered.")

          ENV_MAP = {
              "Demo":   "DEMO",
              "QED":    "QED",
              "QEDAWS": "QEDAWS",
          }
          dispatch_env = ENV_MAP.get(test_env, test_env.upper())

          dotnet_json = Path("state/all_impacted_workflows.json")
          java_json   = Path("state/all_impacted_java_workflows.json")

          all_dotnet_wf = json.loads(dotnet_json.read_text()) if dotnet_json.exists() else []
          all_java_wf   = json.loads(java_json.read_text())   if java_json.exists()   else []

          if not all_dotnet_wf and not all_java_wf:
              print("No workflows to dispatch.")
              sys.exit(0)

          dispatched = 0
          failed     = 0

          def dispatch(wf, extra_fields):
              global dispatched, failed
              wf_file_name = f"{wf}.yml"
              if dry_run:
                  fields_str = "  ".join(f"{k}={v}" for k, v in extra_fields.items())
                  print(f"  DRY  {wf_file_name} [{fields_str}]")
                  dispatched += 1
                  return
              cmd = [gh, "workflow", "run", wf_file_name, "--repo", repo]
              for k, v in extra_fields.items():
                  cmd += ["-f", f"{k}={v}"]
              result = subprocess.run(cmd, capture_output=True, text=True)
              if result.returncode == 0:
                  print(f"  OK  {wf_file_name}  ({' '.join(f'{k}={v}' for k,v in extra_fields.items())})")
                  dispatched += 1
              else:
                  err = result.stderr.strip()
                  if ("422" in err or "404" in err or
                          "workflow_dispatch" in err.lower() or
                          "not found" in err.lower()):
                      print(f"  WARN {wf_file_name}: skipped ({err[:120]})",
                            file=sys.stderr)
                  else:
                      print(f"  FAIL {wf_file_name}: {err}", file=sys.stderr)
                      failed += 1

          # DNet workflows: only TEST_SITE_DotNet
          for wf in all_dotnet_wf:
              dispatch(wf, {"TEST_SITE_DotNet": dispatch_env})

          # Java workflows: TEST_ENVIRONMENT + TEST_SITE
          for wf in all_java_wf:
              dispatch(wf, {"TEST_ENVIRONMENT": dispatch_env, "TEST_SITE": test_site})

          if dry_run:
              print(f"\nDRY RUN — {dispatched} workflow(s) analysed, none triggered.")
          else:
              print(f"\nDispatched: {dispatched}  Failed: {failed}")
          if failed > 0:
              sys.exit(1)
          EOF

      # ── Step 7: Write job summary ────────────────────────────────────────────
      - name: Write job summary
        if: always()
        env:
          PR_NUMBERS:    ${{ inputs.pr_numbers }}
          SCAN_DATE:     ${{ inputs.scan_date }}
          DATE_FROM:     ${{ inputs.date_from }}
          DATE_TO:       ${{ inputs.date_to }}
          STATE:         ${{ inputs.state }}
          ENV_INPUT:     ${{ inputs.env }}
          TEST_SITE:     ${{ inputs.test_site }}
          DRY_RUN:       ${{ inputs.dry_run }}
          PR_COUNT:      ${{ steps.discover.outputs.pr_count          || '0' }}
          WF_COUNT:      ${{ steps.map.outputs.workflow_count         || '0' }}
          JAVA_WF_COUNT: ${{ steps.map.outputs.java_workflow_count    || '0' }}
          PLAN_COUNT:    ${{ steps.map.outputs.plan_count             || '0' }}
          TRIGGER_DATE:  ${{ github.run_started_at }}
        run: |
          python3 - <<'EOF'
          import json, os, yaml
          from datetime import date, datetime, timedelta, timezone
          from pathlib import Path

          pr_numbers    = os.environ.get("PR_NUMBERS", "")
          scan_date     = os.environ.get("SCAN_DATE",  "")
          date_from     = os.environ.get("DATE_FROM", "")
          date_to       = os.environ.get("DATE_TO", "")
          state         = os.environ.get("STATE", "merged")
          env_input     = os.environ.get("ENV_INPUT", "Demo")
          test_site     = os.environ.get("TEST_SITE", "main")
          dry_run       = os.environ.get("DRY_RUN", "false").lower() == "true"
          pr_count      = int(os.environ.get("PR_COUNT", "0"))
          wf_count      = int(os.environ.get("WF_COUNT", "0"))
          java_wf_count = int(os.environ.get("JAVA_WF_COUNT", "0"))
          plan_count    = int(os.environ.get("PLAN_COUNT", "0"))

          if pr_numbers:
              mode = f"Explicit PR numbers: `{pr_numbers}`"
          elif scan_date:
              mode = f"Single date: `{scan_date}` · state=`merged`"
          else:
              mode = f"Date range: `{date_from or '*'}` → `{date_to or 'now'}` · state=`{state}`"

          RISK_BADGE = {"high": "🔴 high", "medium": "🟡 medium", "low": "🟢 low"}

          dnet_display = f"{wf_count} (dry run)"      if dry_run else str(wf_count)
          java_display = f"{java_wf_count} (dry run)" if dry_run else str(java_wf_count)

          lines = [
              "## Run Selective Regression — Manual Dispatch",
              "",
          ]
          if dry_run:
              lines += [
                  "> [!NOTE]",
                  "> **DRY RUN** — Analysis completed. No regression workflows were triggered.",
                  "",
              ]
          lines += [
              "| Field | Value |",
              "|---|---|",
              f"| Mode | {mode} |",
              f"| Environment | **{env_input}** |",
              f"| Test site (Java) | **{test_site}** |",
              f"| PRs discovered | {pr_count} |",
              f"| Test plans built | {plan_count} |",
              f"| DNet workflows dispatched | {dnet_display} |",
              f"| Java workflows dispatched | {java_display} |",
              "",
          ]

          if pr_count == 0:
              lines += ["### No PRs found matching the given criteria.", ""]
          else:
              prs_file     = Path("state/prs_discovered.json")
              impacts_file = Path("state/per_file_impacts.json")

              prs     = json.loads(prs_file.read_text())    if prs_file.exists()     else []
              impacts = json.loads(impacts_file.read_text()) if impacts_file.exists() else {}

              # ── PR overview table ─────────────────────────────────────────────
              lines += ["### PRs Processed", "",
                         "| Repository | PR | State | Created | Title |",
                         "|---|---|---|---|---|"]
              for pr in prs:
                  num       = pr["number"]
                  url       = pr.get("html_url", "")
                  title     = pr.get("title", "")[:55]
                  s         = pr.get("state", "?")
                  created   = (pr.get("created_at") or "")[:10]
                  merged    = " ✓" if pr.get("merged_at") else ""
                  repo_name = pr.get("repo_name", "cobalt_search")
                  lines.append(f"| `{repo_name}` | [#{num}]({url}) | {s}{merged} | {created} | {title} |")
              lines.append("")

              # ── Per-PR file impact breakdown ──────────────────────────────────
              lines += ["---", "", "## PR File Impact Details", ""]

              for pr in prs:
                  num       = pr["number"]
                  url       = pr.get("html_url", "")
                  title     = pr.get("title", "")
                  repo_name = pr.get("repo_name", "cobalt_search")
                  pr_key    = f"{repo_name}_{num}"

                  lines += [f"### [{repo_name} — PR #{num}]({url})", f"> {title}", ""]

                  pr_files = impacts.get(pr_key, {}).get("files", [])

                  if pr_files:
                      lines += [
                          "| File | Matched By | Module / Path | Risk | Test Categories |",
                          "|------|------------|---------------|------|-----------------|",
                      ]
                      for f in pr_files:
                          fname = f["filename"]
                          m_by  = f.get("matched_by", "none")
                          m_key = f.get("match_key") or "—"
                          risk  = f.get("risk", "low")
                          cats  = f.get("categories", [])

                          disp_name = fname if len(fname) <= 65 else "…" + fname[-62:]
                          disp_key  = m_key if len(m_key) <= 45 else "…" + m_key[-42:]

                          if cats:
                              shown    = cats[:3]
                              overflow = len(cats) - 3
                              cats_str = ", ".join(shown) + (f" +{overflow}" if overflow > 0 else "")
                          else:
                              cats_str = "—"

                          lines.append(
                              f"| `{disp_name}` | {m_by} | `{disp_key}` "
                              f"| {RISK_BADGE.get(risk, risk)} | {cats_str} |"
                          )
                      lines.append("")
                  else:
                      lines += ["*No changed files recorded.*", ""]

                  # Per-PR summary from test plan
                  plan_file = Path(f"state/test_plans/{pr_key}.json")
                  if plan_file.exists():
                      plan   = json.loads(plan_file.read_text())
                      cats   = plan.get("test_categories", [])
                      risk   = plan.get("risk_level", "")
                      reason = plan.get("reason", "")
                      if cats:
                          lines += [
                              f"**Risk level:** {RISK_BADGE.get(risk, risk or '—')} &nbsp;|&nbsp; "
                              f"**Test categories ({len(cats)}):** {', '.join(cats)}",
                              "",
                          ]
                      if reason:
                          lines += [f"*{reason}*", ""]

              # ── Dispatched workflows ──────────────────────────────────────────
              dotnet_json = Path("state/all_impacted_workflows.json")
              java_json   = Path("state/all_impacted_java_workflows.json")
              all_dotnet  = json.loads(dotnet_json.read_text()) if dotnet_json.exists() else []
              all_java    = json.loads(java_json.read_text())   if java_json.exists()   else []
              if all_dotnet or all_java:
                  lines += ["---", "", "### Workflows Dispatched", "",
                             "| Workflow | Type | Inputs | Target Repo |",
                             "|---|---|---|---|"]
                  for wf in all_dotnet:
                      lines.append(
                          f"| `{wf}.yml` | DNet | `TEST_SITE_DotNet={env_input}` | `tr/CobaltRegressionTesting` |"
                      )
                  for wf in all_java:
                      lines.append(
                          f"| `{wf}.yml` | Java | `TEST_ENVIRONMENT={env_input}` `TEST_SITE={test_site}` | `tr/CobaltRegressionTesting` |"
                      )
                  lines.append("")

              # ── Workflows Not Dispatched ──────────────────────────────────────
              if env_input.upper() == "DEMO":
                  trigger_ts   = os.environ.get("TRIGGER_DATE", "").strip()
                  if trigger_ts:
                      trigger_date = datetime.fromisoformat(
                          trigger_ts.replace("Z", "+00:00")).date()
                  else:
                      trigger_date = date.today()

                  DAY_NAMES        = ["Monday","Tuesday","Wednesday","Thursday",
                                      "Friday","Saturday","Sunday"]
                  trigger_day_name = DAY_NAMES[trigger_date.weekday()]

                  schedule_path = Path("config/demo-schedule.yml")
                  freq_path     = Path("config/workflow-frequency.yml")

                  lines += ["---", "", "### Workflows Not Dispatched", "",
                             f"> **Trigger:** {trigger_date} ({trigger_day_name})", ""]

                  if not schedule_path.exists() or not freq_path.exists():
                      lines += ["> `config/demo-schedule.yml` or `config/workflow-frequency.yml` "
                                "not found — skipping.", ""]
                  else:
                      sched_data   = yaml.safe_load(schedule_path.read_text())
                      patterns_def = sched_data.get("patterns", {})
                      freq_data    = yaml.safe_load(freq_path.read_text())
                      all_wf_freqs = freq_data.get("workflows", {})

                      matching_week = None
                      for entry in sched_data.get("schedule", []):
                          week_of  = date.fromisoformat(entry["week_of"])
                          week_end = week_of + timedelta(days=6)
                          if week_of <= trigger_date <= week_end:
                              matching_week = entry
                              break

                      if not matching_week:
                          lines += ["> No DEMO week entry found for this date in "
                                    "`config/demo-schedule.yml`.", ""]
                      else:
                          pattern  = str(matching_week.get("pattern", "A"))
                          holidays = matching_week.get("holidays") or []

                          if trigger_day_name in ("Saturday", "Sunday"):
                              lines += ["> Weekend — no scheduled analysis.", ""]
                          elif trigger_day_name in holidays:
                              lines += [f"> **{trigger_day_name}** is a holiday this week "
                                        "— no analysis scheduled.", ""]
                          else:
                              day_sched      = patterns_def.get(pattern, {}).get("schedule", {})
                              expected_freqs = day_sched.get(trigger_day_name, ["Daily"])
                              expected_set   = set(expected_freqs)

                              lines += [
                                  f"> Pattern **{pattern}** · {trigger_day_name} "
                                  f"→ expected frequencies: **{', '.join(expected_freqs)}**",
                                  "",
                              ]

                              dispatched_dnet_set = set(all_dotnet)
                              dispatched_java_set = set(all_java)

                              nd_dnet = []
                              nd_java = []
                              for wf_name, wf_freq in all_wf_freqs.items():
                                  if wf_freq not in expected_set:
                                      continue
                                  if wf_name.startswith("WL_Java_"):
                                      if wf_name not in dispatched_java_set:
                                          nd_java.append((wf_name, wf_freq))
                                  else:
                                      if wf_name not in dispatched_dnet_set:
                                          nd_dnet.append((wf_name, wf_freq))

                              if nd_dnet or nd_java:
                                  lines += [
                                      "| Workflow | Type | Frequency |",
                                      "|---|---|---|",
                                  ]
                                  for wf, freq in sorted(nd_dnet):
                                      lines.append(f"| `{wf}.yml` | DNet | {freq} |")
                                  for wf, freq in sorted(nd_java):
                                      lines.append(f"| `{wf}.yml` | Java | {freq} |")
                                  lines.append("")
                              else:
                                  lines += ["*All expected workflows for this day were dispatched.*",
                                            ""]

          with open(os.environ.get("GITHUB_STEP_SUMMARY", "summary.md"), "a") as f:
              f.write("\n".join(lines) + "\n")
          print("\n".join(lines))
          EOF
