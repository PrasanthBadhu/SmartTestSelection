################################################################################
# feature-map-document.yml
# Location: config/feature-map-document.yml
#
# Purpose:
#   Maps tr/cobalt_document_netcore file paths / keywords to TestCategory names.
#   TestCategory names match @SET CATEGORY_NAME=TestCategory=<name> in
#   config/dotnet/**/*.bat files in tr/CobaltRegressionTesting.
#
# Mapping chain:
#   cobalt_document_netcore changed files
#     -> module / sub_path / keyword
#       -> test_categories (this file)
#         -> bat files with CATEGORY_NAME=TestCategory=<name>
#           -> WL_DNet_*.yml workflows
#
# Priority order (highest wins):
#   1. sub_path  — longest prefix match on the changed file path
#   2. module    — top-level folder prefix match
#   3. keyword   — PR title / body text match (case-insensitive)
#
# Repo layout (verified via git ls-tree HEAD --name-only in tr/cobalt_document_netcore):
#   Document/               Core .NET document engine (shared by all products)
#   WestlawNext/            Westlaw Next document handling
#   Carswell/               Carswell / LN Canada document handling
#   Correctional/           Correctional law document handling
#   Drafting/               Legislative drafting document handling
#   SLWB/                   SLWB document handling
#   TNPCarswell/            Thomson Newspapers Platform / Carswell document handling
#   Weblinks/               Government weblinks document handling
#   DocumentSuperbuild/     Multi-module build configuration
#   Binaries/               Pre-compiled binaries and utilities
#   docs/                   Documentation (skip_all applied via change_type_rules)
################################################################################

version: "1.0"
last_updated: "2026-06-17"

# ──────────────────────────────────────────────────────────────────────────────
# MODULE MAPPINGS  (key = top-level folder name in cobalt_document_netcore)
# Prefix match: any file whose path starts with "<key>/" maps here.
# risk_multiplier: high | medium | low
# ──────────────────────────────────────────────────────────────────────────────
modules:

  Document:
    description: "Core .NET document engine — shared pipeline, controllers, domain, caching"
    test_categories:
      - Document
      - DocDisplay
      - DOCX
      - WebsiteDelivery
      - PrPSynopsisDelivery
      - ResearchReportsDelivery
      - RelatedInfoDelivery
      - EdgeSmokeFeatures
    risk_multiplier: high

  WestlawNext:
    description: "Westlaw Next document handling — rendering, delivery, display"
    test_categories:
      - Document
      - DocDisplay
      - DOCX
      - WebsiteDelivery
      - PrPSynopsisDelivery
      - ResearchReportsDelivery
      - RelatedInfoDelivery
      - CoreSearch
      - GlobalSearch
      - EdgeSmokeFeatures
    risk_multiplier: high

  Carswell:
    description: "Carswell / LN Canada document handling"
    test_categories:
      - CanadaDocDisplay
      - DocumentMisc
      - Trillium
      - TrilliumWebSite
      - DocDisplay
      - DOCX
      - EdgeSmokeFeatures
    risk_multiplier: medium

  Correctional:
    description: "Correctional law document handling"
    test_categories:
      - WLNCorrectional
      - DocDisplay
      - Document
      - EdgeSmokeFeatures
    risk_multiplier: low

  Drafting:
    description: "Legislative drafting document handling"
    test_categories:
      - DocDisplay
      - Document
      - EdgeSmokeFeatures
    risk_multiplier: low

  SLWB:
    description: "SLWB document handling"
    test_categories:
      - DocDisplay
      - Document
      - EdgeSmokeFeatures
    risk_multiplier: medium

  TNPCarswell:
    description: "Thomson Newspapers Platform / Carswell document handling"
    test_categories:
      - CanadaDocDisplay
      - DocumentMisc
      - DocDisplay
      - EdgeSmokeFeatures
    risk_multiplier: low

  Weblinks:
    description: "Government weblinks document integration"
    test_categories:
      - GovernmentWeblinks
      - Links
      - DocDisplay
      - EdgeSmokeFeatures
    risk_multiplier: low

  DocumentSuperbuild:
    description: "Multi-module build configuration — rarely needs test triggers"
    test_categories:
      - EdgeSmokeFeatures
    risk_multiplier: low

# ──────────────────────────────────────────────────────────────────────────────
# SUB-MODULE PATH MAPPINGS  (key = file path prefix, longest match wins)
# Priority 1 (highest).  Each product module follows the pattern:
#   <Product>/<ProductName>Document/   — main implementation
