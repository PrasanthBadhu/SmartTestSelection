################################################################################
# feature-map-relatedinfo.yml
# Location: config/feature-map-relatedinfo.yml
#
# Purpose:
#   Maps tr/cobalt_relatedinfo file paths / keywords to TestCategory names.
#   TestCategory names match @SET CATEGORY_NAME=TestCategory=<name> in
#   config/dotnet/**/*.bat files in tr/CobaltRegressionTesting.
#
# Mapping chain:
#   cobalt_relatedinfo changed files
#     -> module / sub_path / keyword
#       -> test_categories (this file)
#         -> bat files with CATEGORY_NAME=TestCategory=<name>
#           -> WL_DNet_*.yml workflows
#
# Priority order (highest wins):
#
# Repo layout (verified via git ls-tree HEAD --name-only in tr/cobalt_relatedinfo):
#   RelatedInfo/              Core related info module (shared by all products)
#   RelatedInfoConfig/        Configuration and manifest management
#   RelatedInfoSerialized/    Serialization / deserialization layer
#   AccelusRelatedInfo/       Accelus product related info module
#   CarswellRelatedInfo/      Carswell / LN Canada related info module
#   CorrectionalRelatedInfo/  Correctional law related info module
#   DraftingRelatedInfo/      Legislative drafting related info module
#   SlwbRelatedInfo/          SLWB related info module
#   TNPCarswellRelatedInfo/   Thomson Newspapers Platform / Carswell related info module
#   WLNRelatedInfo/           Westlaw Next related info module
#   WestKMRelatedInfo/        West Key Number related info module
################################################################################

version: "2.0"
last_updated: "2026-06-18"

# MODULE MAPPINGS  (key = top-level folder name in cobalt_relatedinfo)
# Prefix match: any file whose path starts with "<key>/" maps here.
# risk_multiplier: high | medium | low
