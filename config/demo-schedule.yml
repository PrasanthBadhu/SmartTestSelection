################################################################################
# demo-schedule.yml
# Location: config/demo-schedule.yml
#
# Purpose:
#   DEMO environment analysis schedule for 2026-2027.
#   Extracted from the release calendar (calendar.xlsx).
#
# Analysis types:
#   Daily        - run every demo day
#   WeeklyTwice  - run on the full-demo day only (WT)
#   Weekly       - run on the full-demo day only  (W)
#
# Pattern rules (Mon–Fri only; QED days and holidays are excluded):
#   Pattern A  →  full-demo day = Monday
#     Monday   : Daily + Weekly + WeeklyTwice
#     Tue–Fri  : Daily only
#
#   Pattern B  →  full-demo day = Tuesday
#     Monday   : Daily only
#     Tuesday  : Daily + Weekly + WeeklyTwice
#     Wed–Fri  : Daily only
#
# Fields per entry:
#   week_of    : the Monday date of that calendar week  (YYYY-MM-DD)
#   demo_date  : the date that runs Daily+W+WT          (YYYY-MM-DD)
#   pattern    : A or B
#   holidays   : days skipped that week (no analysis run)
#   notes      : free-text context
################################################################################

version: "1.0"
last_updated: "2026-06-26"

# Pattern reference (read by tooling):
patterns:
  A:
    full_demo_day: Monday
    schedule:
      Monday:    [Daily, Weekly, WeeklyTwice]
      Tuesday:   [Daily]
      Wednesday: [Daily]
      Thursday:  [Daily]
      Friday:    [Daily]
  B:
    full_demo_day: Tuesday
    schedule:
      Monday:    [Daily]
      Tuesday:   [Daily, Weekly, WeeklyTwice]
      Wednesday: [Daily]
      Thursday:  [Daily]
      Friday:    [Daily]

# ── 2026 Demo Schedule ────────────────────────────────────────────────────────
