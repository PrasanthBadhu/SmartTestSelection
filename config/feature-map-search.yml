################################################################################
# feature-map-search.yml
# Location: tr/Seven-Kingdoms repository root
#
# Purpose:
#   Maps cobalt_search modules / sub-paths / keywords to TestCategory names.
#   TestCategory names come from @SET CATEGORY_NAME=TestCategory=<name> in
#   config/dotnet/**/*.bat files in tr/CobaltRegressionTesting.
#
#   pr-impact-analyzer.py  reads this file to decide which TestCategory values
#   are impacted by a given PR. The runner then finds which WL_DNet_*.yml
#   workflows have bat files containing those TestCategory values and triggers
#   only those workflows.
#
# Mapping chain:
#   cobalt_search changed files
#     -> module / sub_path / keyword
#       -> test_categories (this file)
#         -> bat files with CATEGORY_NAME=TestCategory=<name>
#           -> WL_DNet_*.yml workflows
################################################################################

version: "6.0"
last_updated: "2026-06-18"

