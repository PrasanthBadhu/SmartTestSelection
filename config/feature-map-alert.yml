################################################################################
# feature-map-alert.yml
# Location: config/feature-map-alert.yml
#
# Purpose:
#   Maps tr/cobalt_alert file paths / keywords to TestCategory names.
#   TestCategory names match @SET CATEGORY_NAME=TestCategory=<name> in
#   config/dotnet/**/*.bat files in tr/CobaltRegressionTesting.
#
# Mapping chain:
#   cobalt_alert changed files
#     -> module / sub_path / keyword
#       -> test_categories (this file)
#         -> bat files with CATEGORY_NAME=TestCategory=<name>
#           -> WL_DNet_*.yml workflows
#
# Priority order (highest wins):
#   1. sub_path  — longest prefix match on the changed file path
#   2. module    — top-level folder prefix match
#   3. keyword   — PR title / body text match (case-insensitive)
#
# Repo layout (verified via git ls-tree HEAD --name-only in tr/cobalt_alert):
#   Alert/                  Core alert framework (shared by all products)
#   AlertCommon/            Shared alert utilities and base classes
#   AlertEventListener/     Event processing and listener infrastructure
#   AlertProcessor/         Core alert processing engine
#   AlertProductService/    Product service layer (REST endpoints)
#   AlertSerialized/        Alert data serialization / deserialization
#   AlertStatsListener/     Alert statistics tracking
#   AlertVeracode/          Security scanning integration
#   AnalyticsAlert/         Analytics-specific alert module
#   CarswellAlert/          Carswell / LN Canada alert module
#   ClassifierProcessor/    Alert classification logic
#   JudicialPracticeAlert/  Judicial practice alert module
#   PubProducerMaintainer/  Publisher / producer maintenance
#   SLWBAlert/              SLWB alert module
#   TNPCarswellAlert/       Thomson Newspapers Platform / Carswell alert module
#   WFBAlert/               WFB alert module
#   WLNAlert/               Westlaw Next alert module
#   Config/                 Configuration management
#   LoggingConfig/          Logging configuration
################################################################################

version: "2.0"
last_updated: "2026-06-17"

