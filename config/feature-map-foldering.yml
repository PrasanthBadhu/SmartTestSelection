################################################################################
# feature-map-foldering.yml
# Location: config/feature-map-foldering.yml
#
# Purpose:
#   Maps tr/cobalt_foldering file paths / keywords to TestCategory names.
#   TestCategory names match @SET CATEGORY_NAME=TestCategory=<name> in
#   config/dotnet/**/*.bat files in tr/CobaltRegressionTesting.
#
# Mapping chain:
#   cobalt_foldering changed files
#     -> module / sub_path / keyword
#       -> test_categories (this file)
#         -> bat files with CATEGORY_NAME=TestCategory=<name>
#           -> WL_DNet_*.yml workflows
#
# Priority order (highest wins):
#   1. sub_path  — longest prefix match on the changed file path
#   2. module    — top-level folder prefix match
#   3. keyword   — PR title / body text match (case-insensitive)
#
# Repo layout (verified via git ls-tree HEAD --name-only in tr/cobalt_foldering):
#   Foldering/              Core foldering module (shared by all products)
#   FolderingCommon/        Shared utilities and base classes
#   FolderingSerialized/    Serialization / deserialization layer
#   FormsFolderingCore/     Forms-specific foldering core
#   SharedFoldering/        Shared web resources
#   SharedFolderingCache/   Caching infrastructure
#   History/                Historical audit modules (HistoryListener, HistoryPlatform)
#   CarswellFoldering/      Carswell / LN Canada foldering module
#   CorrectionalFoldering/  Correctional law foldering module
#   DraftingFoldering/      Legislative drafting foldering module
#   TNPCarswellFoldering/   Thomson Newspapers Platform / Carswell foldering module
#   WFBFoldering/           WFB foldering module
#   eReaderFoldering/       eReader foldering module
################################################################################

version: "2.0"
last_updated: "2026-06-17"

