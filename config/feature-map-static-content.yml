################################################################################
# feature-map-static-content.yml
# Location: config/feature-map-static-content.yml
#
# Purpose:
#   Maps tr/cobalt_static-content file paths / keywords to TestCategory names.
#
# HOW TO FILL IN MODULES:
#   Look at the top-level folders in tr/cobalt_static-content and add one entry
#   per folder.  Example — if the repo has a folder "WLNStaticContent/":
#
#     modules:
#       WLNStaticContent:
#         description: "WLN static assets"
#         test_categories: [WebsiteCore1, WebsiteCore2, WebsiteDelivery]
#         risk_multiplier: medium
#
#   The workflow does a prefix match: any file whose path starts with
#   "<module_name>/" is assigned to that module.
#
# HOW TO FILL IN SUB_PATHS:
#   Add deeper-path overrides (longer match wins over module).  Example:
#
#     sub_paths:
#       "WLNStaticContent/css/mobile/":
#         product: Mobile
#         test_categories: [WebsiteMobile]
#
# HOW TO FILL IN KEYWORDS:
#   Keywords are matched against the PR title + body (case-insensitive).
#   They act as a catch-all when no file-path match fires.
################################################################################

version: "1.0"
last_updated: "2026-06-09"

# ──────────────────────────────────────────────────────────────────────────────
# MODULE MAPPINGS  (key = top-level folder name in cobalt_static-content)
# Add one entry per top-level folder.  risk_multiplier: high | medium | low
# ──────────────────────────────────────────────────────────────────────────────
modules:
  # TODO: replace these examples with the actual top-level folders in
  #       tr/cobalt_static-content once you have reviewed the repo structure.
  #
  # Example entries — uncomment and edit:
  #
  # WLNStaticContent:
  #   description: "WLN static assets (CSS, JS, images)"
  #   test_categories: [WebsiteCore1, WebsiteCore2, WebsiteDelivery, EdgeSmokeFeatures]
  #   risk_multiplier: medium
  #
  # CarswellStaticContent:
  #   description: "Carswell static assets"
  #   test_categories: [CoreSearch, Search, EdgeSmokeFeatures]
  #   risk_multiplier: low
  #
  # SharedStaticContent:
  #   description: "Shared / common static assets"
  #   test_categories: [WebsiteCore1, WebsiteCore2, EdgeSmokeFeatures]
  #   risk_multiplier: medium

# ──────────────────────────────────────────────────────────────────────────────
# SUB-MODULE PATH MAPPINGS  (key = file path prefix, longest match wins)
# ──────────────────────────────────────────────────────────────────────────────
sub_paths:
  # TODO: add sub-path overrides as needed.  Example:
  #
  # "WLNStaticContent/css/mobile/":
  #   product: Mobile
  #   test_categories: [WebsiteMobile]
  #
  # "WLNStaticContent/css/aunz/":
  #   product: AUNZ
  #   test_categories: [AnzEdgeRegression, AnzWebsite]

# ──────────────────────────────────────────────────────────────────────────────
# KEYWORD MAPPINGS  (matched against PR title + body, case-insensitive)
# These fire when no module or sub_path match is found.
# ──────────────────────────────────────────────────────────────────────────────
keywords:
  website:
    test_categories:
      - WebsiteCore1
      - WebsiteCore2
      - EdgeSmokeFeatures
  delivery:
    test_categories:
      - WebsiteDelivery
      - EdgeSmokeFeatures
  mobile:
    test_categories:
      - WebsiteMobile
      - EdgeSmokeFeatures
  css:
    test_categories:
      - WebsiteCore1
      - WebsiteCore2
      - EdgeSmokeFeatures
  template:
    test_categories:
      - WebsiteCore1
      - WebsiteDelivery
      - EdgeSmokeFeatures
  static:
    test_categories:
      - WebsiteCore1
      - EdgeSmokeFeatures
  aunz:
    test_categories:
      - AnzEdgeRegression
      - AnzWebsite
  canada:
    test_categories:
      - CoreSearch
      - Search
  search:
    test_categories:
      - CoreSearch
      - EdgeSmokeFeatures

# ──────────────────────────────────────────────────────────────────────────────
# CHANGE-TYPE RULES
# ──────────────────────────────────────────────────────────────────────────────
change_type_rules:
  docs:
    skip_all: true
  chore:
    test_categories_override:
      - EdgeSmokeFeatures

# ──────────────────────────────────────────────────────────────────────────────
# HIGH-RISK ALWAYS-ADD  (appended when risk_level == high)
# ──────────────────────────────────────────────────────────────────────────────
high_risk_always_add:
  test_categories:
    - CoreSearch
    - EdgeSmokeFeatures
    - WebsiteCore1
