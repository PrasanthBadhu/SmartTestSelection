################################################################################
# feature-map-static-content.yml
# Location: config/feature-map-static-content.yml
#
# Purpose:
#   Maps tr/cobalt_static-content file paths / keywords to TestCategory names.
#   TestCategory names match @SET CATEGORY_NAME=TestCategory=<name> in
#   config/dotnet/**/*.bat files in tr/CobaltRegressionTesting.
#
# Mapping chain:
#   cobalt_static-content changed files
#     -> module / sub_path / keyword
#       -> test_categories (this file)
#         -> bat files with CATEGORY_NAME=TestCategory=<name>
#           -> WL_DNet_*.yml workflows
#
# Priority order (highest wins):
#   1. sub_path  — longest prefix match on the changed file path
#   2. module    — top-level folder prefix match
#   3. keyword   — PR title / body text match (case-insensitive)
#
# Static content risk guidance:
#   - Shared CSS / JS (CommonStaticContent, WLNStaticContent base): HIGH — impacts every page
#   - Product-specific CSS / JS: MEDIUM
#   - HTML templates / fragments: HIGH — structural layout changes
#   - Images / fonts / icons:     LOW
#
# NOTE: Module names and sub-path prefixes are based on common Cobalt static
#       content folder conventions.  Run `git ls-tree HEAD --name-only` in
#       tr/cobalt_static-content to confirm actual top-level folder names and
#       adjust entries as needed.
################################################################################

version: "4.0"
