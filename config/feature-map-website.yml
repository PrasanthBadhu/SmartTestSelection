################################################################################
# feature-map-website.yml
# Location: config/feature-map-website.yml
#
# Purpose:
#   Maps tr/cobalt_website file paths / keywords to TestCategory names.
#
# HOW TO FILL IN MODULES:
#   Look at the top-level folders in tr/cobalt_website and add one entry
#   per folder.  Example — if the repo has a folder "WLNWebsite/":
#
#     modules:
#       WLNWebsite:
#         description: "WLN website components"
#         test_categories: [WebsiteCore1, WebsiteCore2, WebsiteDelivery]
#         risk_multiplier: medium
#
#   The workflow does a prefix match: any file whose path starts with
#   "<module_name>/" is assigned to that module.
#
# HOW TO FILL IN SUB_PATHS:
#   Add deeper-path overrides (longer match wins over module).  Example:
#
#     sub_paths:
#       "WLNWebsite/src/com/tr/cobalt/web/aunz/":
#         product: AUNZ
#         test_categories: [AnzEdgeRegression, AnzWebsite]
#
# HOW TO FILL IN KEYWORDS:
#   Keywords are matched against PR title + body (case-insensitive).
################################################################################

version: "1.0"
last_updated: "2026-06-09"

# ──────────────────────────────────────────────────────────────────────────────
# MODULE MAPPINGS  (key = top-level folder name in cobalt_website)
# Add one entry per top-level folder.  risk_multiplier: high | medium | low
# ──────────────────────────────────────────────────────────────────────────────
modules:
  # TODO: replace these examples with the actual top-level folders in
  #       tr/cobalt_website once you have reviewed the repo structure.
  #
  # Example entries — uncomment and edit:
  #
  # WLNWebsite:
  #   description: "Westlaw Next website components"
  #   test_categories:
  #     - WebsiteCore1
  #     - WebsiteCore2
  #     - WebsiteDelivery
  #     - EdgeSmokeFeatures
  #   risk_multiplier: medium
  #
  # CarswellWebsite:
  #   description: "Carswell website components (Canada)"
  #   test_categories:
  #     - CoreSearch
  #     - Search
  #     - WebsiteMisc
  #     - EdgeSmokeFeatures
  #   risk_multiplier: medium
  #
  # WLNWebsiteCommon:
  #   description: "Shared website foundation layer"
  #   test_categories:
  #     - WebsiteCore1
  #     - WebsiteCore2
  #     - WebsiteDelivery
  #     - WebsiteMisc
  #     - EdgeSmokeFeatures
  #   risk_multiplier: high
  #
  # ANZWebsite:
  #   description: "Australia / New Zealand website"
  #   test_categories:
  #     - AnzEdgeRegression
  #     - AnzWebsite
  #     - EdgeSmokeFeatures
  #   risk_multiplier: medium

# ──────────────────────────────────────────────────────────────────────────────
# SUB-MODULE PATH MAPPINGS  (key = file path prefix, longest match wins)
# ──────────────────────────────────────────────────────────────────────────────
sub_paths:
  # TODO: add sub-path overrides as needed.  Example:
  #
  # "WLNWebsite/src/com/tr/cobalt/web/aunz/":
  #   product: AUNZ
  #   test_categories: [AnzEdgeRegression, AnzWebsite, AnzDocuments]
  #
  # "WLNWebsite/src/com/tr/cobalt/web/mobile/":
  #   product: Mobile
  #   test_categories: [WebsiteMobile]

# ──────────────────────────────────────────────────────────────────────────────
# KEYWORD MAPPINGS  (matched against PR title + body, case-insensitive)
# ──────────────────────────────────────────────────────────────────────────────
keywords:
  website:
    test_categories:
      - WebsiteCore1
      - WebsiteCore2
      - EdgeSmokeFeatures
  delivery:
    test_categories:
      - WebsiteDelivery
      - EdgeSmokeFeatures
  homepage:
    test_categories:
      - WebsiteCore1
      - WebsiteCore2
      - EdgeSmokeFeatures
  navigation:
    test_categories:
      - WebsiteCore1
      - EdgeSmokeFeatures
  mobile:
    test_categories:
      - WebsiteMobile
      - EdgeSmokeFeatures
  search:
    test_categories:
      - CoreSearch
      - EdgeSmokeFeatures
  aunz:
    test_categories:
      - AnzEdgeRegression
      - AnzWebsite
  canada:
    test_categories:
      - CoreSearch
      - Search
      - WebsiteMisc
  alert:
    test_categories:
      - AlertAccess
      - EdgeSmokeFeatures
  folder:
    test_categories:
      - ResearchOrganizer
      - EdgeSmokeFeatures
  analytics:
    test_categories:
      - WLAnalytics
      - WLAnalyticsIndigo
      - EdgeSmokeFeatures

# ──────────────────────────────────────────────────────────────────────────────
# CHANGE-TYPE RULES
# ──────────────────────────────────────────────────────────────────────────────
change_type_rules:
  docs:
    skip_all: true
  chore:
    test_categories_override:
      - EdgeSmokeFeatures
  test:
    skip_integration: true

# ──────────────────────────────────────────────────────────────────────────────
# HIGH-RISK ALWAYS-ADD  (appended when risk_level == high)
# ──────────────────────────────────────────────────────────────────────────────
high_risk_always_add:
  test_categories:
    - CoreSearch
    - EdgeSmokeFeatures
    - WebsiteCore1
    - WebsiteCore2
