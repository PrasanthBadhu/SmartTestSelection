################################################################################
# feature-map-website.yml
# Location: config/feature-map-website.yml
#
# Purpose:
#   Maps tr/cobalt_website file paths / keywords to TestCategory names.
#   TestCategory names match @SET CATEGORY_NAME=TestCategory=<name> in
#   config/dotnet/**/*.bat files in tr/CobaltRegressionTesting.
#
# Mapping chain:
#   cobalt_website changed files
#     -> module / sub_path / keyword
#       -> test_categories (this file)
#         -> bat files with CATEGORY_NAME=TestCategory=<name>
#           -> WL_DNet_*.yml workflows
#
# Priority order (highest wins):
#
# Actual repo layout (verified via gh api repos/tr/cobalt_website/git/trees/HEAD):
#   WestKM/               WestKM knowledge management module
#   Analytics/            Analytics module
#
# Legacy placeholder module names (WLNWebsite, WLNWebsiteCommon, etc.) are retained
# for backward compatibility; actual top-level folder modules (WestlawNext, WestKM,
# App, Analytics) are added below with accurate sub_path entries.
################################################################################

version: "4.0"
last_updated: "2026-06-18"

